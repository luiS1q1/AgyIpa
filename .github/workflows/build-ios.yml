name: Build iOS App (Unsigned IPA)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cd agy-overlay/ios-app
          xcodegen generate

      - name: Build Unsigned Archive
        run: |
          cd agy-overlay/ios-app
          if ! xcodebuild archive \
            -project agy-overlay.xcodeproj \
            -scheme agy-overlay \
            -destination "generic/platform=iOS" \
            -archivePath unsigned.xcarchive \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO > build.log 2>&1; then
            echo "=== BUILD LOG ==="
            cat build.log
            exit 74
          fi


      - name: Package IPA
        run: |
          cd agy-overlay/ios-app
          mkdir -p Payload
          cp -r unsigned.xcarchive/Products/Applications/*.app Payload/
          zip -r -y agy-overlay.ipa Payload

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: agy-overlay/ios-app/build.log

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: agy-overlay-ipa
          path: agy-overlay/ios-app/agy-overlay.ipa
          if-no-files-found: error

