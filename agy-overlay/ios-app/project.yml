name: agy-overlay
options:
  bundleIdPrefix: com.antigravity
  minimumXcodeGenVersion: 2.28.0

targets:
  agy-overlay:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: agy-overlay
        excludes:
          - "Info.plist"
    info:
      plist:
        UILaunchScreen: {}

    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.antigravity.agyoverlay
      INFOPLIST_FILE: agy-overlay/Info.plist
      SWIFT_VERSION: "5.0"

